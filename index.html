<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>World Conquest Game</title>

<style>
  body {
    margin: 0;
    display: flex;
    height: 100vh;
    background: #060c14;
    color: white;
    font-family: Arial, sans-serif;
  }

  #sidebar {
    width: 240px;
    background: #0b111a;
    padding: 10px;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    margin-bottom: 8px;
    padding: 8px;
    cursor: pointer;
  }

  svg {
    flex: 1;
  }

  path {
    stroke: #333;
    cursor: pointer;
  }

  #log {
    font-size: 12px;
    margin-top: 10px;
    max-height: 300px;
    overflow-y: auto;
  }
</style>
</head>

<body>

<div id="sidebar">
  <button onclick="setAction('invade')">Invade</button>
  <button onclick="setAction(null)">Cancel</button>
  <button onclick="endTurn()">End Turn</button>

  <h4>Log</h4>
  <div id="log"></div>
</div>

<svg viewBox="0 0 1000 500">

  <!-- REGIONS -->
  <path id="north_america" d="M 85,55 L 110,45 L 145,40 L 180,48 L 210,52 L 235,65 L 250,85 L 255,110 L 248,135 L 240,155 L 225,170 L 210,185 L 195,195 L 178,200 L 160,205 L 145,195 L 125,185 L 108,170 L 92,150 L 78,128 L 72,105 L 78,78 Z"></path>

  <path id="central_america" d="M 178,200 L 195,195 L 210,185 L 220,198 L 215,215 L 200,222 L 185,218 L 175,210 Z"></path>

  <path id="south_america" d="M 170,225 L 195,218 L 220,220 L 238,235 L 248,258 L 252,285 L 248,315 L 238,345 L 220,370 L 200,390 L 180,398 L 162,385 L 148,360 L 140,330 L 138,298 L 142,268 L 150,242 Z"></path>

  <path id="greenland" d="M 185,18 L 210,15 L 230,22 L 235,38 L 220,48 L 198,48 L 182,38 Z"></path>

  <path id="western_europe" d="M 380,62 L 408,55 L 432,58 L 448,70 L 452,88 L 445,108 L 428,120 L 408,125 L 388,118 L 372,102 L 368,82 Z"></path>

  <path id="eastern_europe" d="M 448,58 L 478,52 L 508,55 L 522,68 L 520,88 L 508,105 L 488,115 L 465,118 L 448,108 L 445,88 Z"></path>

  <path id="africa" d="M 372,138 L 408,132 L 448,135 L 475,148 L 485,172 L 488,200 L 485,235 L 478,268 L 465,298 L 448,325 L 425,348 L 402,358 L 378,350 L 355,328 L 340,298 L 335,265 L 338,232 L 345,200 L 352,168 L 360,148 Z"></path>

  <path id="russia" d="M 518,30 L 588,22 L 658,18 L 728,22 L 785,32 L 810,48 L 812,68 L 798,85 L 768,95 L 728,100 L 688,98 L 648,95 L 608,98 L 568,100 L 535,95 L 518,80 L 512,58 Z"></path>

  <path id="middle_east" d="M 478,118 L 508,112 L 538,115 L 558,128 L 562,148 L 552,168 L 532,178 L 508,180 L 485,172 L 472,155 L 470,135 Z"></path>

  <path id="asia" d="M 558,75 L 608,68 L 648,70 L 668,85 L 665,105 L 645,118 L 612,122 L 578,118 L 558,105 L 552,88 Z"></path>

  <path id="oceania" d="M 728,272 L 775,265 L 818,268 L 848,282 L 858,305 L 845,328 L 815,342 L 778,345 L 742,338 L 718,320 L 712,298 Z"></path>

</svg>

<script>
// ─── GAME STATE ───
const AI = ["china", "russia", "eu"];

let owner = {
  north_america: "player",
  asia: "china",
  russia: "russia",
  western_europe: "eu",
};

let action = null;
let log = [];

// ─── LOG ───
function addLog(msg) {
  log.push(msg);
  if (log.length > 20) log.shift();
  document.getElementById("log").innerHTML = log.map(l => `<div>${l}</div>`).join("");
}

// ─── COLOR UPDATE ───
function updateColors() {
  Object.keys(owner).forEach(id => {
    const el = document.getElementById(id);

    if (!el) return;

    if (owner[id] === "player") {
      el.setAttribute("fill", "#22aa44");
    } else if (AI.includes(owner[id])) {
      el.setAttribute("fill", "#cc3333");
    } else {
      el.setAttribute("fill", "#1a2a3a");
    }
  });
}

// ─── INVASION ───
function invade(region) {
  if (owner[region] === "player") return;

  if (Math.random() > 0.55) {
    owner[region] = "player";
    addLog("Captured " + region);
  } else {
    addLog("Failed attack on " + region);
  }

  updateColors();
}

// ─── CLICK REGION ───
function selectRegion(id) {
  if (action === "invade") {
    invade(id);
  }
}

// ─── ACTIONS ───
function setAction(a) {
  action = a;
  addLog("Action: " + (a || "none"));
}

// ─── AI TURN ───
function endTurn() {
  Object.keys(owner).forEach(r => {
    if (AI.includes(owner[r]) && Math.random() > 0.7) {
      const targets = Object.keys(owner);
      const t = targets[Math.floor(Math.random() * targets.length)];
      owner[t] = owner[r];
    }
  });

  addLog("AI moved");
  updateColors();
}

// ─── INIT CLICK EVENTS ───
document.querySelectorAll("path").forEach(p => {
  p.addEventListener("click", () => selectRegion(p.id));
});

// start
updateColors();
</script>

</body>
</html>
