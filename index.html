              <g style={{pointerEvents:"none"}}>
                <rect x={cx-60} y={cy-18} width="120" height="36" fill="rgba(0,0,0,0.85)" rx="4" stroke="#2a3a4a" strokeWidth="1"/>
                <text x={cx} y={cy-4} textAnchor="middle" fontSize="10" fill="#c8d8e8" fontFamily="Georgia,serif" fontWeight="700">{REGIONS[rid].name}</text>
                <text x={cx} y={cy+10} textAnchor="middle" fontSize="9" fill="#4a6070" fontFamily="Georgia,serif">{REGIONS[rid].vp}VP · {oname}</text>
              </g>
            );
          })()}

          {/* Legend */}
          <rect x="8" y="8" width="130" height="108" fill="rgba(4,12,24,0.88)" rx="5" stroke="#1e2830" strokeWidth="1"/>
          <text x="16" y="24" fontSize="8" fill="#3a4a5a" fontFamily="Georgia,serif" letterSpacing="2">LEGEND</text>
          {[{flag:pf.flag,color:pColor,name:"You"},
            ...AI_FACTIONS.map(a=>({flag:a.flag,color:a.color,name:a.name})),
            {flag:"",color:"#0d6e4a",name:"Allied"},
            {flag:"",color:"#1a2830",name:"Neutral"},
          ].map((item,i)=>(
            <g key={i}>
              <rect x="14" y={32+i*17} width="12" height="12" fill={item.color} rx="2"/>
              {item.flag&&<text x="18" y={42+i*17} fontSize="9">{item.flag}</text>}
              <text x="30" y={42+i*17} fontSize="9" fill="#6a7a8a" fontFamily="Georgia,serif">{item.name}</text>
            </g>
          ))}

          {/* Action banner */}
          {selAction&&(
            <>
              <rect x="200" y="8" width="600" height="26" fill="rgba(245,158,11,0.12)" rx="4" stroke="#f59e0b" strokeWidth="1"/>
              <text x="500" y="25" textAnchor="middle" fontSize="11" fill="#f59e0b" fontFamily="Georgia,serif" letterSpacing="1">
                Click a territory to target it
              </text>
            </>
          )}
        </svg>

        {/* Stats bar under map */}
        <div style={{position:"absolute",bottom:0,left:0,right:0,display:"flex",gap:16,padding:"6px 16px",background:"rgba(4,12,24,0.9)",borderTop:"1px solid #1e2830",justifyContent:"center",flexWrap:"wrap"}}>
          {[{label:"Your VP",val:`${playerVP}/${TOTAL_VP}`,color:pColor},
            {label:"Regions",val:REGION_IDS.filter(r=>terr[r]==="player").length,color:pColor},
            {label:"Allies",val:allies.size,color:"#4ade80"},
            ...AI_FACTIONS.map(ai=>({label:ai.name,val:`${aiVP(ai.id)}VP`,color:ai.color}))
          ].map((s,i)=>(
            <div key={i} style={{fontSize:11,color:"#3a4a5a"}}>
              {s.label}: <strong style={{color:s.color}}>{s.val}</strong>
            </div>
          ))}
        </div>
      </div>
    )}

    {/* ── LOG TAB ── */}
    {tab==="log"&&(
      <div ref={logRef} style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:6}}>
        {log.map(e=>(
          <div key={e.id} style={{...S.logRow,
            color:e.t==="win"?"#4ade80":e.t==="loss"?"#f87171":e.t==="start"?"#f59e0b":e.t==="intel"?"#818cf8":"#4a6070",
            borderLeft:`2px solid ${e.t==="win"?"#4ade80":e.t==="loss"?"#f87171":e.t==="start"?"#f59e0b":e.t==="intel"?"#818cf8":"#1e2830"}`
          }}>{e.m}</div>
        ))}
        <div style={{height:8}}/>
      </div>
    )}

    {/* ── NEWS TAB ── */}
    {tab==="news"&&(
      <div ref={newsRef} style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
        {news.length===0&&<div style={{color:"#2a3a4a",fontSize:13,textAlign:"center",marginTop:60}}>No news yet…</div>}
        {[...news].reverse().map((item,i)=>(
          <div key={item.ts+i} style={{...S.newsCard,borderColor:`${newsTypeColor[item.type]||"#1e2830"}44`}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,alignItems:"center"}}>
              <span style={{fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",fontWeight:700,

              </span>
              <span style={{fontSize:9,color:"#2a3a4a"}}>{item.from}</span>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:"#c8d8e8",marginBottom:5,lineHeight:1.4}}>{item.headline}</div>
            <div style={{fontSize:12,color:"#4a5a6a",lineHeight:1.7}}>{item.body}</div>
          </div>
        ))}
      </div>
    )}
  </div>
</div>
